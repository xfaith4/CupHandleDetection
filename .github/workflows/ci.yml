# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: {}

jobs:
  test:
    name: Pester (PowerShell)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PowerShell
        uses: PowerShell/PowerShell@v1
        with:
          pwsh-version: "latest"

      - name: Install Pester
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          Install-Module Pester -Force -Scope CurrentUser -MinimumVersion 5.0.0

      - name: Run Pester tests
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          $config = New-PesterConfiguration
          $config.Run.Path = 'tests'
          $config.Run.PassThru = $true
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputFormat = 'NUnitXml'
          $config.TestResult.OutputPath = 'test-results/pester-results.xml'
          $config.Should.ErrorAction = 'Continue'

          $result = Invoke-Pester -Configuration $config
          if ($result.FailedCount -gt 0) { throw "Pester failed: $($result.FailedCount) test(s) failed." }

      - name: Upload test results (NUnit XML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pester-test-results
          path: test-results/pester-results.xml